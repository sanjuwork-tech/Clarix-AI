kind = "web"
previewPath = "/"
title = "CA AI Services Brand Website"
version = "1.0.0"
id = "artifacts/ca-ai-brand"
router = "path"

[[integratedSkills]]
name = "react-vite"
version = "1.0.0"

[[services]]
name = "web"
paths = [ "/" ]
localPort = 20906

[services.development]
run = "pnpm --filter @workspace/ca-ai-brand run dev"

[services.production]
build = [ "pnpm", "--filter", "@workspace/ca-ai-brand", "run", "build" ]
publicDir = "artifacts/ca-ai-brand/dist/public"
serve = "static"

[[services.production.rewrites]]
from = "/*"
to = "/index.html"

[services.env]
PORT = "20906"
BASE_PATH = "/"
